<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Dependency & Security Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 2rem;
        }

        h1 {
            margin-bottom: 0.5rem;
        }

        h2 {
            cursor: pointer;
            margin-top: 2rem;
            user-select: none;
            font-size: 1.3rem;
        }

        /* Collapsible container */
        .collapsible {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 1rem;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 0.4rem 0.6rem;
            font-size: 0.9rem;
        }

        th {
            background: #f2f2f2;
            text-align: left;
            cursor: pointer;
        }

        .severity-CRITICAL {
            background: #ffe0e0;
        }

        .severity-HIGH {
            background: #ffe8d5;
        }

        .severity-MEDIUM {
            background: #fff5d5;
        }

        .severity-LOW {
            background: #eaf7ff;
        }

        .badge {
            padding: 0.15rem 0.4rem;
            border-radius: 0.4rem;
            font-size: 0.75rem;
            background: #444;
            color: #fff;
        }

        #meta {
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            color: #444;
        }
    </style>
</head>

<body>
    <h1>Dependency & Security Dashboard</h1>
    <p id="meta"></p>

    <!-- TOP LEVEL DEPENDENCIES -->
    <h2 data-target="top-section">Top-Level Dependencies ▼</h2>
    <div id="top-section" class="collapsible">
        <table id="top-table">
            <thead>
                <tr>
                    <th data-sort="name">Package</th>
                    <th data-sort="version">Current</th>
                    <th>Latest</th>
                    <th data-sort="vulnCount">Vulns</th>
                    <th data-sort="severity">Severity</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- TRANSITIVE DEPENDENCIES -->
    <h2 data-target="trans-section">Transitive Dependencies ▼</h2>
    <div id="trans-section" class="collapsible">
        <table id="trans-table">
            <thead>
                <tr>
                    <th data-sort="name">Package</th>
                    <th data-sort="version">Current</th>
                    <th data-sort="vulnCount">Vulns</th>
                    <th data-sort="severity">Severity</th>
                    <th>Required By</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
