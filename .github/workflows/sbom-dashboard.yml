name: SBOM Dashboard

on:
  push:
    branches:
      - i/3rd-party-dashboard
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  sbom-and-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Install Syft (manual, enterprise-safe)
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          syft dir:. -o cyclonedx-json > sbom.json
          echo "SBOM generated: sbom.json"

      # ---- Install Grype (manual, enterprise-safe)
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan vulnerabilities with Grype
        run: |
          grype sbom:sbom.json -o json > grype-output.json
          echo "Vulnerability report generated: grype-output.json"

      # ---- Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      # ---- Install dependencies
      - name: Install deps
        run: yarn install --frozen-lockfile

      # ---- Collect latest available versions
      - name: Collect latest versions
        run: |
          # Yarn outdated returns exit code 1 when outdated packages exist.
          # We suppress it because we need the output.
          yarn outdated --json > outdated.json || true

          # Guarantee file exists
          if [ ! -s outdated.json ]; then echo "{}" > outdated.json; fi

          echo "Latest version metadata saved to outdated.json"

      # ---- Generate dashboard summary
      - name: Generate dashboard summary
        run: node scripts/build-dashboard-summary.mjs

      # ---- Commit updated dashboard
      - name: Commit updated dashboard
        run: |
          if [ -n "$(git status --porcelain docs/dependency-dashboard/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/dependency-dashboard/data
            git commit -m "Update dependency dashboard [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
