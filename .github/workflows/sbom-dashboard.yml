name: SBOM Dashboard

on:
  push:
    branches:
      - i/3rd-party-dashboard
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  sbom-and-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Install Syft (manual, enterprise-safe)
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          syft dir:. -o cyclonedx-json > sbom.json
          echo "SBOM generated: sbom.json"

      # ---- Install Grype (manual, enterprise-safe)
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan vulnerabilities with Grype
        run: |
          grype sbom:sbom.json -o json > grype-output.json
          echo "Vulnerability report generated: grype-output.json"

      # ---- Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      # ---- Install dependencies
      - name: Install deps
        run: yarn install --frozen-lockfile

      # ---- Collect & Normalize latest versions
      - name: Collect latest versions
        run: |
          # Capture Yarn’s JSON event stream
          yarn outdated --json > raw-outdated.log || true

          node << 'EOF'
          const fs = require('fs');

          const lines = fs.readFileSync('raw-outdated.log', 'utf8')
            .trim()
            .split('\n')
            .map(l => { try { return JSON.parse(l); } catch { return null; }})
            .filter(Boolean);

          const map = {};

          for (const entry of lines) {
            if (entry.type === 'table') {
              const rows = entry.data.body;
              for (const row of rows) {
                const pkg = row[0];     // package name
                const current = row[1]; // current installed
                const latest = row[3];  // latest available
                map[pkg] = { current, latest };
              }
            }
          }

          fs.writeFileSync('outdated.json', JSON.stringify(map, null, 2));
          console.log("Created normalized outdated.json:", Object.keys(map).length, "entries");
          EOF

      # ---- Generate dashboard summary
      - name: Generate dashboard summary
        run: node scripts/build-dashboard-summary.mjs

      # ---- Commit updated dashboard
      - name: Commit updated dashboard
        run: |
          if [ -n "$(git status --porcelain docs/dependency-dashboard/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/dependency-dashboard/data
            git commit -m "Update dependency dashboard [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
