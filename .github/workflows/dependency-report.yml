name: SBOM Dashboard

on:
  push:
    branches:
      - i/3rd-party-dashboard
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  sbom-and-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow pushing to central dashboard repo

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      # --- SBOM ---
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: syft dir:. -o cyclonedx-json > sbom.json

      # --- Vulnerabilities ---
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan vulnerabilities
        run: grype sbom:sbom.json -o json > grype-output.json

      # --- Install Node + project deps ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: yarn install --immutable

      # --- Generate outdated.json ---
      - name: Collect latest versions
        run: |
          yarn outdated --json > raw.log || true

          node << 'EOF'
          const fs = require('fs');
          const lines = fs.readFileSync('raw.log','utf8')
            .split('\n')
            .map(l => { try { return JSON.parse(l) } catch { return null }})
            .filter(Boolean);

          const out = {};
          for (const e of lines) {
            if (e.type === "table") {
              for (const r of e.data.body) {
                out[r[0]] = { current: r[1], latest: r[3] };
              }
            }
          }
          fs.writeFileSync("outdated.json", JSON.stringify(out,null,2));
          EOF

      # --- DOWNLOAD SHARED SCRIPT FROM CENTRAL DASHBOARD ---
      - name: Download build-summary.mjs from dashboard repo
        run: |
          curl -L \
            https://raw.githubusercontent.com/PA-NIHR-CRN/dependency-dashboard/main/docs/dashboard/scripts/build-summary.mjs \
            -o build-summary.mjs

          # Confirm file downloaded correctly (should NOT contain 404)
          if grep -q "404: Not Found" build-summary.mjs; then
            echo "ERROR: build-summary.mjs not found in dashboard repo"
            exit 1
          fi

      # --- Run summary builder ---
      - name: Build summary JSON
        run: node build-summary.mjs

      # --- Push filename: dte.json ---
      - name: Checkout dashboard repo
        uses: actions/checkout@v4
        with:
          repository: PA-NIHR-CRN/dependency-dashboard
          token: ${{ secrets.DEPENDENCY_DASHBOARD_TOKEN }}
          path: dashboard

      - name: Save file into dashboard/data
        run: |
          mkdir -p dashboard/docs/dashboard/data
          cp summary.json dashboard/docs/dashboard/data/dte.json

          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard/data
          git commit -m "Update report for dte" || echo "No changes"
          git push
