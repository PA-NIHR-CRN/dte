name: Dependency Report

on:
  push:
    branches:
      - i/3rd-party-dashboard
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      # ---- SBOM ----
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: syft dir:. -o cyclonedx-json > sbom.json

      # ---- Vulnerabilities ----
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan vulnerabilities
        run: grype sbom:sbom.json -o json > grype-output.json

      # ---- Node version collection ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: yarn install --immutable

      - name: Collect registry latest
        run: |
          yarn outdated --json > raw.log || true
          node << 'EOF'
          const fs = require('fs');
          const lines = fs.readFileSync('raw.log','utf8')
            .split('\n')
            .map(l => { try { return JSON.parse(l) } catch { return null }})
            .filter(Boolean);

          const out = {};
          for (const e of lines) {
            if (e.type === "table") {
              for (const r of e.data.body) {
                out[r[0]] = { current: r[1], latest: r[3] };
              }
            }
          }
          fs.writeFileSync("outdated.json", JSON.stringify(out,null,2));
          EOF

      # ---- Build JSON summary ----
      - name: Build summary.json
        run: node scripts/build-summary.mjs

      # ---- Checkout central dashboard repo ----
      - name: Checkout dashboard repo
        uses: actions/checkout@v4
        with:
          repository: PA-NIHR-CRN/dependency-dashboard
          token: ${{ secrets.PA_NIHR_CRN_READ_REPOS_PAT }}
          path: dashboard

      # ---- Save & commit ----
      - name: Save file
        run: |
          mkdir -p dashboard/docs/dependency-dashboard/data
          cp summary.json dashboard/docs/dependency-dashboard/data/dte.json

          cd dashboard

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/dependency-dashboard/data
          git commit -m "Update report for dte" || echo "No changes"
          git push
